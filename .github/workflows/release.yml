name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify format, tests, and lints
        run: |
          cargo fmt --check
          cargo test --locked --workspace
          cargo clippy --locked --workspace --all-targets -- -D warnings
          cargo fmt --manifest-path tools/agent-memory-eval/Cargo.toml -- --check
          cargo test --manifest-path tools/agent-memory-eval/Cargo.toml
          cargo clippy --manifest-path tools/agent-memory-eval/Cargo.toml --all-targets -- -D warnings
          RUSTDOCFLAGS="-D warnings" cargo doc --locked --workspace --no-deps

  msrv:
    name: Verify Rust 1.95 MSRV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-msrv-1.95

      - name: Check workspace on MSRV
        run: cargo check --locked --workspace --all-targets

  build:
    name: Build ${{ matrix.target }}
    needs: [verify, msrv]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: mge-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: mge-windows-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: mge-macos-aarch64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: mge-macos-x86_64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build product binaries
        run: cargo build --locked -p mge-cli --bin mge --bin mge-mcp-server --release --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          stage="dist/mge-${{ matrix.target }}"
          mkdir -p "$stage/bin" "$stage/docs"
          cp "target/${{ matrix.target }}/release/mge" "$stage/bin/"
          cp "target/${{ matrix.target }}/release/mge-mcp-server" "$stage/bin/"
          cp LICENSE NOTICE README.md QUICKSTART.md SECURITY.md "$stage/"
          cp docs/ARCHITECTURE.md docs/INTEGRATION.md docs/RELEASE.md docs/SECURITY.md "$stage/docs/"
          tar -czf "dist/${{ matrix.archive }}" -C dist "mge-${{ matrix.target }}"
          (
            cd dist
            shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          )

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "dist/mge-${{ matrix.target }}"
          New-Item -ItemType Directory -Force "$stage/bin", "$stage/docs" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mge.exe" "$stage/bin/"
          Copy-Item "target/${{ matrix.target }}/release/mge-mcp-server.exe" "$stage/bin/"
          Copy-Item LICENSE,NOTICE,README.md,QUICKSTART.md,SECURITY.md $stage
          Copy-Item docs/ARCHITECTURE.md,docs/INTEGRATION.md,docs/RELEASE.md,docs/SECURITY.md "$stage/docs/"
          Compress-Archive -Path $stage -DestinationPath "dist/${{ matrix.archive }}"
          $hash = (Get-FileHash "dist/${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.archive }}" | Set-Content -Encoding ascii "dist/${{ matrix.archive }}.sha256"

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error

  draft-release:
    name: Create draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Prepare checksums
        shell: bash
        run: |
          set -euo pipefail
          cat dist/*.sha256 | sort > dist/SHA256SUMS
          rm dist/*.sha256

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(dist/*.tar.gz dist/*.zip dist/SHA256SUMS)
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --draft --generate-notes --title "${GITHUB_REF_NAME}"
          fi
