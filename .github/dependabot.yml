version: 2

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Yekaterinburg
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      rust-compatible:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: "/tools/agent-memory-eval"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Asia/Yekaterinburg
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      eval-compatible:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Asia/Yekaterinburg
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      actions-compatible:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
