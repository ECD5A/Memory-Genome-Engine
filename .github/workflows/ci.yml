name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Eval tests
        if: runner.os == 'Linux'
        run: cargo test --manifest-path tools/agent-memory-eval/Cargo.toml

      - name: Eval clippy
        if: runner.os == 'Linux'
        run: cargo clippy --manifest-path tools/agent-memory-eval/Cargo.toml --all-targets -- -D warnings

      - name: Check CLI binaries
        run: cargo check -p mge-cli --bins

      - name: Build product release binaries
        run: cargo build -p mge-cli --bin mge --bin mge-mcp-server --release

      - name: Product release smoke
        if: runner.os != 'Windows'
        run: bash scripts/smoke-release.sh

      - name: Product release smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/smoke-release.ps1
